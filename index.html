<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영독작2 분석지 | 에듀케레 영수학원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --navy-light: #243460;
  --gold: #c8a84b;
  --gold-light: #e8d08b;
  --cream: #faf8f3;
  --white: #ffffff;
  --gray-light: #f0eeea;
  --gray: #888;
  --text: #1a1a2e;
  --green-bg: #e8f5e9;
  --green-text: #2e7d32;
  --yellow-bg: #fffde7;
  --yellow-text: #7f6000;
  --blue-mid: #2E75B6;
  --correct: #2e7d32;
  --wrong: #c62828;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* ── COVER ── */
#cover {
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 40px 20px;
}
#cover::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 40%, rgba(200,168,75,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(42,60,120,0.4) 0%, transparent 50%);
}
.cover-deco {
  position:absolute;
  border: 1px solid rgba(200,168,75,0.2);
  border-radius: 50%;
}
.cover-deco:nth-child(1){width:600px;height:600px;top:-200px;right:-200px;}
.cover-deco:nth-child(2){width:400px;height:400px;bottom:-150px;left:-100px;}
.cover-inner {
  position:relative; z-index:1; text-align:center;
}
.cover-badge {
  display:inline-block;
  border:1px solid var(--gold);
  color:var(--gold);
  font-size:11px; letter-spacing:3px; text-transform:uppercase;
  padding:6px 20px; margin-bottom:32px;
  font-family:'EB Garamond',serif;
}
.cover-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(52px,10vw,96px);
  font-weight:900;
  color:var(--white);
  line-height:1;
  margin-bottom:8px;
}
.cover-title span { color:var(--gold); }
.cover-subtitle {
  font-family:'EB Garamond',serif;
  font-size:clamp(16px,3vw,22px);
  color:rgba(255,255,255,0.65);
  letter-spacing:2px;
  margin-bottom:48px;
}
.cover-divider {
  width:80px; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:0 auto 36px;
}
.cover-info {
  color:rgba(255,255,255,0.5);
  font-size:13px; line-height:2;
  letter-spacing:1px;
}
.cover-info strong { color:var(--gold-light); }
.cover-start {
  margin-top:48px;
  background: var(--gold);
  color: var(--navy);
  border:none; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  font-weight:700; font-size:14px;
  padding:14px 40px;
  letter-spacing:2px;
  transition: all .3s;
}
.cover-start:hover { background:var(--gold-light); transform:translateY(-2px); }

/* ── MAIN APP ── */
#app { display:none; }
.app-header {
  background: var(--navy);
  padding: 16px 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.app-logo {
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:700;
  color:var(--white);
}
.app-logo span { color:var(--gold); }
.app-school {
  font-size:11px; color:rgba(255,255,255,0.5);
  letter-spacing:1px;
}

/* Sidebar + Content */
.app-body {
  display:flex; min-height: calc(100vh - 57px);
}
.sidebar {
  width:220px; flex-shrink:0;
  background:var(--navy-light);
  padding:20px 0;
  position:sticky; top:57px;
  height:calc(100vh - 57px);
  overflow-y:auto;
}
.sidebar-section {
  padding:8px 16px 4px;
  font-size:10px; letter-spacing:2px;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  font-weight:700;
}
.sidebar-item {
  display:block; width:100%;
  padding:10px 20px;
  background:none; border:none; cursor:pointer;
  text-align:left;
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px; color:rgba(255,255,255,0.65);
  border-left:3px solid transparent;
  transition:all .2s;
  line-height:1.4;
}
.sidebar-item:hover { background:rgba(255,255,255,0.05); color:var(--white); }
.sidebar-item.active {
  background:rgba(200,168,75,0.12);
  color:var(--gold);
  border-left-color:var(--gold);
  font-weight:700;
}
.sidebar-item .passage-num {
  display:block; font-size:10px;
  color:rgba(255,255,255,0.3);
  font-weight:400;
}
.sidebar-item.active .passage-num { color:rgba(200,168,75,0.6); }

/* Main content */
.main-content {
  flex:1; padding:32px;
  max-width: 900px;
  overflow-x:hidden;
}

/* Tabs */
.tabs {
  display:flex; gap:4px; margin-bottom:28px;
  border-bottom:2px solid rgba(26,39,68,0.1);
  overflow-x:auto; padding-bottom:0;
}
.tab-btn {
  background:none; border:none; cursor:pointer;
  padding:10px 18px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px; font-weight:500;
  color:var(--gray);
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  white-space:nowrap;
  transition:all .2s;
}
.tab-btn:hover { color:var(--navy); }
.tab-btn.active {
  color:var(--navy);
  border-bottom-color:var(--gold);
  font-weight:700;
}

/* Passage header */
.passage-header {
  margin-bottom:24px;
}
.passage-tag {
  display:inline-block;
  background:var(--gold);
  color:var(--navy);
  font-size:11px; font-weight:700;
  padding:3px 10px; letter-spacing:1px;
  margin-bottom:10px;
}
.passage-title {
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:700;
  color:var(--navy); line-height:1.3;
}

/* Tab content */
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── TAB 1: 전문 ── */
.full-text-box {
  background:var(--white);
  border:1px solid #ddd;
  border-left:4px solid var(--blue-mid);
  border-radius:4px;
  padding:24px 28px;
  font-family:'EB Garamond',serif;
  font-size:17px; line-height:2;
  color:#1a1a1a;
  margin-bottom:20px;
}

/* ── TAB 2: 문장분석 ── */
.sentence-block { margin-bottom:28px; }
.sent-num {
  display:inline-block;
  width:26px; height:26px;
  background:var(--navy);
  color:var(--white);
  border-radius:50%;
  font-size:12px; font-weight:700;
  text-align:center; line-height:26px;
  margin-right:8px; flex-shrink:0;
}
.sent-english {
  background:var(--white);
  border:1px solid #ccc;
  border-left:4px solid var(--blue-mid);
  padding:14px 18px;
  font-family:'EB Garamond',serif;
  font-size:16px; line-height:1.8;
  margin-bottom:10px;
  display:flex; align-items:flex-start; gap:8px;
}
.sent-english-text { flex:1; }
.slash-reading {
  background:var(--gray-light);
  border-radius:4px;
  padding:10px 16px;
  margin-bottom:10px;
  font-size:13px; line-height:1.9;
  color:#444;
}
.slash-en { color:var(--navy); font-weight:500; font-family:'EB Garamond',serif; font-size:15px; }
.slash-ko { color:#555; font-size:12px; margin-top:2px; }
.grammar-item {
  background:var(--yellow-bg);
  border-left:3px solid var(--gold);
  padding:8px 14px;
  margin-bottom:6px;
  font-size:12.5px; line-height:1.7;
  border-radius:0 4px 4px 0;
}
.grammar-item .g-title { color:var(--yellow-text); font-weight:700; }
.grammar-item .g-example { color:#555; }
.grammar-item .g-point { color:#c62828; font-weight:500; }

/* ── TAB 3: 핵심단어 ── */
.vocab-item {
  background:var(--white);
  border:1px solid #e0e0e0;
  border-left:4px solid var(--green-text);
  padding:12px 18px;
  margin-bottom:8px;
  border-radius:0 6px 6px 0;
  display:flex; gap:16px; align-items:baseline; flex-wrap:wrap;
}
.vocab-word {
  font-family:'EB Garamond',serif;
  font-size:17px; font-weight:600;
  color:var(--navy); min-width:150px;
}
.vocab-meaning { font-size:13px; color:#333; flex:1; }
.vocab-pos {
  font-size:11px; color:var(--green-text);
  background:var(--green-bg);
  padding:2px 8px; border-radius:20px;
  font-weight:700; white-space:nowrap;
}
.vocab-deriv { font-size:12px; color:#777; font-style:italic; }

/* ── TAB 4: 전문해석 ── */
.translation-box {
  background:var(--white);
  border:1px solid #e0e0e0;
  border-radius:6px;
  padding:28px 32px;
  font-size:15px; line-height:2.2;
  color:#2a2a2a;
}
.translation-box p { margin-bottom:16px; }

/* ── TAB 5: 주제와 요지 ── */
.topic-card {
  background:var(--white);
  border:1px solid #e0e0e0;
  border-radius:8px;
  padding:20px 24px;
  margin-bottom:16px;
}
.topic-label {
  font-size:11px; font-weight:700;
  color:var(--gold); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:8px;
}
.topic-content { font-size:14px; line-height:1.8; color:#2a2a2a; }
.structure-step {
  display:flex; gap:16px; align-items:flex-start;
  margin-bottom:12px;
}
.step-badge {
  background:var(--navy);
  color:var(--white);
  font-size:11px; font-weight:700;
  padding:4px 10px; border-radius:20px;
  white-space:nowrap; flex-shrink:0;
  margin-top:2px;
}
.step-text { font-size:13px; line-height:1.7; color:#333; }

/* ── TAB 6: 변형문제 ── */
.quiz-block { margin-bottom:36px; }
.quiz-num {
  display:inline-block;
  background:var(--navy);
  color:var(--white);
  font-size:12px; font-weight:700;
  padding:4px 12px; margin-bottom:12px;
  border-radius:2px;
}
.quiz-question {
  font-size:14px; line-height:1.8;
  margin-bottom:14px; color:#1a1a1a;
  background:var(--white);
  border:1px solid #e0e0e0;
  padding:14px 18px; border-radius:4px;
}
.quiz-question em { font-style:normal; font-weight:700; text-decoration:underline; }
.quiz-options { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.quiz-option {
  display:flex; align-items:center; gap:10px;
  background:var(--white);
  border:1.5px solid #ddd;
  padding:10px 16px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px; line-height:1.6;
  transition:all .2s;
  text-align:left;
}
.quiz-option:hover { border-color:var(--navy); background:var(--gray-light); }
.quiz-option.correct { border-color:var(--correct); background:#e8f5e9; color:var(--correct); font-weight:700; }
.quiz-option.wrong { border-color:var(--wrong); background:#ffebee; color:var(--wrong); }
.quiz-option .opt-icon { font-size:16px; }
.quiz-explanation {
  display:none;
  background:var(--navy);
  color:var(--white);
  font-size:12.5px; padding:10px 16px;
  border-radius:4px; margin-top:6px;
  line-height:1.7;
}
.quiz-explanation.show { display:block; }
.reset-btn {
  background:none; border:1px solid #ccc;
  padding:6px 14px; font-size:12px;
  cursor:pointer; border-radius:4px;
  color:#888; margin-top:8px;
  font-family:'Noto Sans KR',sans-serif;
  transition:all .2s;
}
.reset-btn:hover { border-color:var(--navy); color:var(--navy); }

/* 서술형 */
.essay-block { margin-bottom:28px; }
.essay-label {
  background:var(--navy);
  color:var(--white);
  font-size:12px; font-weight:700;
  padding:6px 14px; display:inline-block;
  margin-bottom:12px; border-radius:2px;
}
.essay-question {
  font-size:14px; line-height:1.9;
  background:var(--white);
  border:1px solid #e0e0e0;
  padding:14px 18px; border-radius:4px;
  margin-bottom:10px; color:#1a1a1a;
}
.essay-condition {
  font-size:12px; color:var(--blue-mid);
  background:rgba(46,117,182,0.08);
  padding:6px 12px; border-radius:4px;
  margin-bottom:12px; font-weight:500;
}
.essay-textarea {
  width:100%; min-height:80px;
  border:1px solid #ccc; border-radius:4px;
  padding:10px 14px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px; resize:vertical;
  background:var(--white); color:#1a1a1a;
  margin-bottom:8px;
}
.essay-textarea:focus { outline:none; border-color:var(--navy); }
.answer-toggle {
  background:none; border:1px solid var(--gold);
  color:var(--gold); padding:7px 16px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:12px; cursor:pointer;
  border-radius:4px; font-weight:700;
  transition:all .2s;
}
.answer-toggle:hover { background:var(--gold); color:var(--navy); }
.essay-answer {
  display:none;
  background:var(--navy);
  color:var(--white);
  padding:12px 18px;
  border-radius:4px; margin-top:10px;
  font-size:13px; line-height:1.8;
}
.essay-answer.show { display:block; }

/* Section titles */
.section-title {
  font-family:'Playfair Display',serif;
  font-size:18px; font-weight:700;
  color:var(--navy); margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:2px solid var(--gold);
  display:flex; align-items:center; gap:10px;
}
.section-title .num {
  background:var(--navy);
  color:var(--white); font-size:12px;
  width:26px; height:26px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; font-family:'Noto Sans KR',sans-serif;
  font-weight:700; flex-shrink:0;
}

/* Divider */
.passage-divider {
  margin:40px 0;
  border:none;
  border-top:2px dashed rgba(26,39,68,0.15);
}

/* Footer */
.main-footer {
  text-align:center; padding:20px;
  font-size:12px; color:#aaa;
  border-top:1px solid #e0e0e0;
  margin-top:40px;
}

/* Mobile */
@media(max-width:700px){
  .sidebar{display:none;}
  .main-content{padding:16px;}
  .tab-btn{padding:8px 10px; font-size:12px;}
}
</style>
</head>
<body>

<!-- ══════════════════ COVER ══════════════════ -->
<div id="cover">
  <div class="cover-deco"></div>
  <div class="cover-deco"></div>
  <div class="cover-inner">
    <div class="cover-badge">에듀케레 영수학원 · Educare Academy</div>
    <div class="cover-title">영독작<span>2</span></div>
    <div class="cover-subtitle">영어 독해 & 작문 심화 분석지</div>
    <div class="cover-divider"></div>
    <div class="cover-info">
      <strong>본문 1</strong> Following the Wall: An Inspiring Walk around Seoul<br>
      <strong>본문 2</strong> The Incredible Adventures of James Holman<br><br>
      총 7블럭 · 전문 / 문장분석 / 핵심단어 / 전문해석 / 주제와요지 / 변형문제
    </div>
    <button class="cover-start" onclick="startApp()">분석지 시작 →</button>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
<header class="app-header">
  <div>
    <div class="app-logo">영독작<span>2</span></div>
    <div class="app-school">에듀케레 영수학원 분석지</div>
  </div>
</header>

<div class="app-body">
<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-section">본문 1 · Seoul Wall</div>
  <button class="sidebar-item active" onclick="showPassage(0)">
    <span class="passage-num">1-1</span>Introduction
  </button>
  <button class="sidebar-item" onclick="showPassage(1)">
    <span class="passage-num">1-2</span>Day 1
  </button>
  <button class="sidebar-item" onclick="showPassage(2)">
    <span class="passage-num">1-3</span>Day 2
  </button>
  <button class="sidebar-item" onclick="showPassage(3)">
    <span class="passage-num">1-4</span>Day 3
  </button>
  <div class="sidebar-section" style="margin-top:12px">본문 2 · Holman</div>
  <button class="sidebar-item" onclick="showPassage(4)">
    <span class="passage-num">2-1</span>Introduction
  </button>
  <button class="sidebar-item" onclick="showPassage(5)">
    <span class="passage-num">2-2</span>The Journey
  </button>
  <button class="sidebar-item" onclick="showPassage(6)">
    <span class="passage-num">2-3</span>Legacy
  </button>
</nav>

<!-- MAIN -->
<main class="main-content" id="mainContent">
<!-- 각 지문은 JS로 렌더링 -->
</main>
</div>
</div>

<script>
// ═══════════════════════════════════════════
// 데이터
// ═══════════════════════════════════════════
const passages = [

// ──────────────────────────────────────────
// 0: 1-1 Introduction
// ──────────────────────────────────────────
{
  tag: "본문 1-1",
  title: "Following the Wall: An Inspiring Walk around Seoul",
  fullText: `I've just returned from an awesome trip to Seoul. It is a vast metropolis that has been Korea's capital for over 600 years. I spent three days walking along the Seoul City Wall, which surrounds the center of Seoul. It was a fantastic way to see this beautiful city from many different angles and to learn about its history along the way.

In 1396, a wall with four main gates and four smaller gates was constructed to keep the city safe from invaders. Although two of the gates are now gone, many sections of this wall still remain. The wall, which stretches approximately 18.6 kilometers, is the longest-standing traditional city wall in the world.`,

  sentences: [
    {
      num:"①",
      en:"I've just returned from an awesome trip to Seoul.",
      slash:"I've just returned / from an awesome trip / to Seoul.",
      slashKo:"나는 방금 돌아왔다 / 멋진 여행에서 / 서울로의.",
      grammar:[
        {title:"현재완료 (have + p.p.)", example:"I've just returned → have returned", point:"★ 부사 just와 함께 쓰여 '방금 ~했다' 의미. 수능 시제 문제 단골."},
        {title:"형용사 awesome", example:"an awesome trip", point:"★ 명사를 수식하는 형용사의 위치 확인."}
      ]
    },
    {
      num:"②",
      en:"It is a vast metropolis that has been Korea's capital for over 600 years.",
      slash:"It is a vast metropolis / that has been Korea's capital / for over 600 years.",
      slashKo:"그것은 거대한 대도시이다 / 한국의 수도였던 / 600년 이상 동안.",
      grammar:[
        {title:"주격 관계대명사 that", example:"a vast metropolis that has been...", point:"★ 선행사(metropolis)를 수식하는 관계절. that vs. which 구별 출제."},
        {title:"현재완료 + for + 기간", example:"has been ... for over 600 years", point:"★ '~동안 계속 ~해왔다' 계속용법. since와의 차이 주의."}
      ]
    },
    {
      num:"③",
      en:"I spent three days walking along the Seoul City Wall, which surrounds the center of Seoul.",
      slash:"I spent three days / walking along the Seoul City Wall, / which surrounds the center of Seoul.",
      slashKo:"나는 3일을 보냈다 / 서울 도성을 따라 걸으며, / 서울의 중심을 둘러싸고 있는.",
      grammar:[
        {title:"spend + 시간 + -ing", example:"spent three days walking", point:"★ 'spend + 시간/돈 + -ing' 구문. 수능 어법 단골 표현."},
        {title:"계속적 용법 관계대명사 which", example:", which surrounds the center", point:"★ 콤마+which = 앞 명사 전체를 부연 설명. that 대체 불가."}
      ]
    },
    {
      num:"④",

  translation:`셋째 날, 나는 남대문으로도 알려진 숭례문에서 트레킹을 시작하여 남대문 시장으로 걸어갔다. 그곳은 10,000개 이상의 가게와 노점이 거리를 따라 늘어선 한국 최대의 전통 시장이다. 나는 그곳에서 많은 사람들과 함께 활기찬 분위기를 즐겼다.

그런 다음 남산 사면의 복원된 도성 구간을 따라 거닐었다. 산 정상에는 많은 방문객들이 있었고, 그곳에서 도시에서 가장 알아보기 쉬운 랜드마크인 N서울타워가 하늘을 향해 솟아오른다. 나는 타워 앞에서 펼쳐지는 흥미진진하고 활기찬 전통 한국 무용 공연도 즐겼다.

공연이 끝난 후, 나는 성벽을 따라 남산을 내려갔다. 결국, 나는 트레킹이 시작되었던 바로 그 장소, 흥인지문으로 돌아와 있음을 알게 되었다.

정말 대단한 경험이었다! 마지막에는 지쳤지만, 트레킹은 절대적으로 그만한 가치가 있었다. 나는 이 여정에서 서울의 많은 다양한 면을 발견했다. 오늘날 서울이 현대성으로 활기차게 뛰는 반면, 서울 도성은 사라졌지만 잊히지 않은 과거를 상기시켜 주는 역할을 한다. 나는 이렇게 훌륭한 역사적 장소들을 순환한 것에 대해 지금 큰 성취감을 느낀다.`,

  translation:`이런 상황에 처한 대부분의 사람들은 절망과 슬픔의 나락으로 빠져들었을 것이다. 그러나 홀먼은 자신의 불행이 그를 주저앉히도록 내버려 두지 않고 자신의 상황에 정면으로 맞섰다. 그는 긍정적인 태도를 유지하려 노력하고, 주변을 찾아다니기 위해 철심 지팡이 사용법을 배우기 시작했다. 두드릴 때마다 청력을 이용해 주변 환경을 더 잘 이해할 수 있었다. 홀먼은 마침내 자신의 이동 능력에 자신감을 갖게 되었고, 심지어 도움 없이 런던의 복잡한 거리를 다닐 수 있게 되었다. 자신감이 커지면서 그는 프랑스와 이탈리아를 여행하며 위대한 모험을 떠나기로 결심했다.

1821년 나폴리에 도착했을 때쯤 홀먼은 이미 숙련된 여행자가 되어 있었다. 그는 심지어 베수비오 산을 오른 최초의 시각 장애인이 되었다. 등반 당시 산은 강렬한 화산 활동의 한창이었다. 홀먼과 두 동료가 화산의 불안정한 가장자리에 접근하자 땅은 걷기에 너무 뜨거울 지경이 되었다. 동료들은 돌아가고 싶어 했지만 홀먼은 두려워하지 않았다. 그는 용감하게 정상에 도달할 때까지 나아갔다.`,

// ═══════════════════════════════════════════
// 상태 & 함수
// ═══════════════════════════════════════════
let currentPassage = 0;
let currentTab = 0;
const tabNames = ["전문","문장분석","핵심단어","전문해석","주제와 요지","변형문제"];

function startApp(){
  document.getElementById('cover').style.display='none';
  document.getElementById('app').style.display='block';
  renderPassage(0);
}

function showPassage(idx){
  currentPassage = idx;
  currentTab = 0;
  document.querySelectorAll('.sidebar-item').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);
  });
  renderPassage(idx);
}

function renderPassage(idx){
  const p = passages[idx];
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'passage-header';
  hdr.innerHTML = `<div class="passage-tag">${p.tag}</div><div class="passage-title">${p.title}</div>`;
  mc.appendChild(hdr);

  // Tabs
  const tabBar = document.createElement('div');
  tabBar.className = 'tabs';
  tabNames.forEach((name,i)=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = name;
    btn.setAttribute('onclick',`switchTab(${i})`);
    btn.id = `tabBtn${i}`;
    tabBar.appendChild(btn);
  });
  mc.appendChild(tabBar);

  // Tab contents
  const contents = document.createElement('div');
  contents.id = 'tabContents';

  // Tab 0: 전문
  contents.appendChild(buildFullText(p));
  // Tab 1: 문장분석
  contents.appendChild(buildSentences(p));
  // Tab 2: 핵심단어
  contents.appendChild(buildVocab(p));
  // Tab 3: 전문해석
  contents.appendChild(buildTranslation(p));
  // Tab 4: 주제와 요지
  contents.appendChild(buildTopic(p));
  // Tab 5: 변형문제
  contents.appendChild(buildQuiz(p, idx));

  mc.appendChild(contents);

  // show first tab
  document.querySelectorAll('.tab-content')[0].classList.add('active');
}

function switchTab(i){
  currentTab = i;
  document.querySelectorAll('.tab-btn').forEach((btn,idx)=>{
    btn.classList.toggle('active', idx===i);
  });
  document.querySelectorAll('.tab-content').forEach((el,idx)=>{
    el.classList.toggle('active', idx===i);
  });
}

// ── Tab builders ──

function buildFullText(p){
  const div = document.createElement('div');
  div.className = 'tab-content';
  div.innerHTML = `<div class="section-title"><span class="num">全</span>전문</div>
  <div class="full-text-box">${p.fullText.replace(/\n\n/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>')}</div>`;
  return div;
}

function buildSentences(p){
  const div = document.createElement('div');
  div.className = 'tab-content';
  let html = `<div class="section-title"><span class="num">2</span>문장분석</div>`;
  p.sentences.forEach(s=>{
    html += `<div class="sentence-block">
      <div class="sent-english"><span class="sent-num">${s.num}</span><span class="sent-english-text">${s.en}</span></div>
      <div class="slash-reading">
        <div class="slash-en">${s.slash}</div>
        <div class="slash-ko">${s.slashKo}</div>
      </div>`;
    s.grammar.forEach(g=>{
      html += `<div class="grammar-item">
        <span class="g-title">◆ ${g.title}</span><br>
        <span class="g-example">▶ ${g.example}</span><br>
        <span class="g-point">${g.point}</span>
      </div>`;
    });
    html += `</div>`;
  });
  div.innerHTML = html;
  return div;
}

function buildVocab(p){
  const div = document.createElement('div');
  div.className = 'tab-content';
  let html = `<div class="section-title"><span class="num">3</span>핵심단어 및 표현</div>`;
  p.vocab.forEach(v=>{
    html += `<div class="vocab-item">
      <span class="vocab-word">${v.word}</span>
      <span class="vocab-meaning">${v.meaning}</span>
      <span class="vocab-pos">${v.pos}</span>
      <span class="vocab-deriv">${v.deriv}</span>
    </div>`;
  });
  div.innerHTML = html;
  return div;
}

function buildTranslation(p){
  const div = document.createElement('div');
  div.className = 'tab-content';
  const paras = p.translation.split('\n\n').map(t=>`<p>${t}</p>`).join('');
  div.innerHTML = `<div class="section-title"><span class="num">4</span>전문해석</div>
  <div class="translation-box">${paras}</div>`;
  return div;
}

function buildTopic(p){
  const div = document.createElement('div');
  div.className = 'tab-content';
  let structureHtml = p.topic.structure.map(s=>`
    <div class="structure-step">
      <span class="step-badge">${s.step}</span>
      <span class="step-text">${s.text}</span>
    </div>`).join('');
  div.innerHTML = `<div class="section-title"><span class="num">5</span>주제와 요지</div>
  <div class="topic-card">
    <div class="topic-label">주 제</div>
    <div class="topic-content">${p.topic.subject}</div>
  </div>
  <div class="topic-card">
    <div class="topic-label">요 지</div>
    <div class="topic-content">${p.topic.mainIdea}</div>
  </div>
  <div class="topic-card">
    <div class="topic-label">구조 흐름</div>
    ${structureHtml}
  </div>`;
  return div;
}

function buildQuiz(p, pIdx){
  const div = document.createElement('div');
  div.className = 'tab-content';
  let html = `<div class="section-title"><span class="num">6</span>변형문제</div>`;

  // MC questions
  p.quiz.forEach((q, qIdx)=>{
    const uid = `p${pIdx}q${qIdx}`;
    html += `<div class="quiz-block" id="block_${uid}">
      <span class="quiz-num">${q.qnum}번 [${q.qtype}]</span>
      <div class="quiz-question">${q.question.replace(/\n/g,'<br>')}</div>
      <div class="quiz-options" id="opts_${uid}">`;
    q.options.forEach((opt, oIdx)=>{
      const numStr = ['①','②','③','④','⑤'][oIdx];
      html += `<button class="quiz-option" id="opt_${uid}_${oIdx}" onclick="selectOpt('${uid}',${oIdx},${q.answer},${pIdx},${qIdx})">
        <span class="opt-icon">${numStr}</span> ${opt}
      </button>`;
    });
    html += `</div>
      <div class="quiz-explanation" id="exp_${uid}">${q.explanation}</div>
      <button class="reset-btn" onclick="resetQuiz('${uid}',${q.options.length})">↺ 다시 풀기</button>
    </div>`;
  });

  // 서술형
  html += `<hr class="passage-divider"><div class="section-title" style="margin-top:8px"><span class="num">서</span>서술형</div>`;
  p.essay.forEach((e, eIdx)=>{
    const uid = `e${pIdx}_${eIdx}`;
    html += `<div class="essay-block">
      <span class="essay-label">${e.label}</span>
      <div class="essay-question">${e.question.replace(/\n/g,'<br>')}</div>
      <div class="essay-condition">${e.condition}</div>
      <textarea class="essay-textarea" id="ta_${uid}" placeholder="여기에 답안을 작성하세요..."></textarea>
      <br>
      <button class="answer-toggle" onclick="toggleAnswer('ans_${uid}')">모범답안 확인</button>
      <div class="essay-answer" id="ans_${uid}">📝 ${e.answer}</div>
    </div>`;
  });

  div.innerHTML = html;
  return div;
}

// ── 인터랙션 함수 ──
function selectOpt(uid, chosen, correct, pIdx, qIdx){
  const optsEl = document.getElementById('opts_'+uid);
  if(optsEl.dataset.answered) return;
  optsEl.dataset.answered = '1';

  const btns = optsEl.querySelectorAll('.quiz-option');
  btns.forEach((btn, i)=>{
    btn.style.cursor = 'default';
    if(i === correct){
      btn.classList.add('correct');
      btn.querySelector('.opt-icon').textContent = '✓';
    } else if(i === chosen && chosen !== correct){
      btn.classList.add('wrong');
      btn.querySelector('.opt-icon').textContent = '✗';
    }
  });

  document.getElementById('exp_'+uid).classList.add('show');
}

function resetQuiz(uid, numOpts){
  const optsEl = document.getElementById('opts_'+uid);
  delete optsEl.dataset.answered;
  const btns = optsEl.querySelectorAll('.quiz-option');
  const icons = ['①','②','③','④','⑤'];
  btns.forEach((btn,i)=>{
    btn.className = 'quiz-option';
    btn.style.cursor = 'pointer';
    btn.querySelector('.opt-icon').textContent = icons[i];
  });
  document.getElementById('exp_'+uid).classList.remove('show');
}

function toggleAnswer(id){
  const el = document.getElementById(id);
  el.classList.toggle('show');
}
</script>
</body>
